<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MathAssistant</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <!-- VIEW 1: Problem Selection -->
      <section id="view-problem-selection" class="view">
        <header class="view-header">
          <h1 class="app-title">MathAssistant</h1>
          <p class="app-subtitle">Algebra Step Validator</p>
        </header>

        <div class="filters">
          <label class="filter-label">
            Difficulty
            <select id="filter-difficulty">
              <option value="">All</option>
              <option value="easy">Easy</option>
              <option value="medium">Medium</option>
              <option value="hard">Hard</option>
            </select>
          </label>
          <label class="filter-label">
            Topic
            <select id="filter-topic">
              <option value="">All</option>
              <option value="distribution">Distribution</option>
              <option value="simplification">Simplification</option>
            </select>
          </label>
        </div>

        <button type="button" id="btn-get-problem" class="btn btn-primary">
          Get a Problem
        </button>

        <p id="problem-loading" class="status-message hidden">Finding a problem...</p>
        <p id="problem-error" class="status-message status-error hidden">
          Could not load a problem. Try again.
        </p>

        <article id="problem-card" class="problem-card hidden">
          <p id="problem-expression" class="problem-expression"></p>
          <div class="problem-meta">
            <span id="problem-difficulty" class="badge"></span>
            <span id="problem-topic" class="tag"></span>
          </div>
          <button type="button" id="btn-start-session" class="btn btn-primary">
            Start Session
          </button>
          <p id="start-session-error" class="inline-error hidden">
            Could not start session. Please try again.
          </p>
        </article>
      </section>

      <!-- VIEW 2: Active Session -->
      <section id="view-active-session" class="view hidden">
        <div class="problem-bar">
          <p class="problem-bar-label">Simplify:</p>
          <div id="session-expression" class="expression-box"></div>
          <div class="problem-meta">
            <span id="session-difficulty" class="badge"></span>
            <span id="session-topic" class="tag"></span>
          </div>
        </div>

        <div class="attempt-tracker">
          <p id="attempt-label" class="attempt-label">Attempt 1 of 5</p>
          <div id="attempt-dots" class="attempt-dots" aria-hidden="true">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
        </div>

        <div class="input-area">
          <label for="step-input" class="input-label">Your answer:</label>
          <input
            type="text"
            id="step-input"
            class="step-input"
            placeholder="e.g. 2x + 6"
            autocomplete="off"
          />
          <p id="input-error" class="inline-error hidden">
            Please enter an expression.
          </p>
          <button type="button" id="btn-submit-step" class="btn btn-primary">
            Check Step
          </button>
        </div>

        <div id="feedback-panel" class="feedback-panel hidden">
          <div id="feedback-banner" class="feedback-banner"></div>
          <p id="deeper-hint-label" class="deeper-hint-label hidden">Deeper hint:</p>
          <p id="feedback-hint" class="feedback-hint"></p>
        </div>

        <details id="attempt-history" class="attempt-history">
          <summary>Show previous attempts ▾</summary>
          <ul id="attempt-history-list" class="attempt-history-list"></ul>
        </details>

        <button type="button" id="btn-give-up" class="link-button">
          Reveal solution
        </button>
      </section>

      <!-- VIEW 3: Session Complete -->
      <section id="view-session-complete" class="view hidden">
        <div id="complete-solved" class="complete-state hidden">
          <div class="checkmark" aria-hidden="true"></div>
          <h2 class="complete-heading complete-heading--success">Well done!</h2>
          <p id="complete-solved-expression" class="complete-detail"></p>
          <p id="complete-solved-answer" class="complete-detail"></p>
          <p id="complete-solved-stats" class="complete-stats"></p>
        </div>

        <div id="complete-ended" class="complete-state hidden">
          <h2 class="complete-heading">Session ended</h2>
          <p id="complete-ended-answer" class="complete-detail"></p>
          <p id="complete-ended-stats" class="complete-stats"></p>
        </div>

        <button type="button" id="btn-try-another" class="btn btn-primary">
          Try another problem
        </button>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
